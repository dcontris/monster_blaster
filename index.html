<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Monster Blaster</title>
  </head>
  <body>
    <main>
      <div class="game-layout">
        <aside id="dev-panel" class="dev-panel" hidden>
          <h2>Developer Tuning</h2>
          <p>Paused: changes apply immediately.</p>
          <div class="tuning-actions">
            <button id="save-tuning" type="button">SAVE VALUES</button>
            <button id="reset-tuning" type="button">RESET DEFAULTS</button>
          </div>
          <output id="tuning-status" class="tuning-status"></output>
        </aside>
        <div class="play-area">
          <button id="pause-button" type="button" hidden>PAUSE</button>
          <div id="game"></div>
          <p class="controls">Move: WASD / Arrow keys &middot; Aim: Mouse &middot; Dash: Shift</p>
        </div>
      </div>
    </main>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
